<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Tea Challenge ☕</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffdce3,#ffeccf);
    font-family:Arial,sans-serif;
}

.container{
    background:white;
    width:90%;
    max-width:700px;
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    margin-top:0;
    font-size:36px;
}

.subtitle{
    font-size:18px;
    color:#666;
    margin-bottom:20px;
}

.score-board{
    background:#fff5f7;
    border-radius:15px;
    padding:15px;
    margin-bottom:25px;
    font-size:22px;
    font-weight:bold;
}

.cups{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:18px;
    justify-items:center;
}

.cup{
    font-size:60px;
    cursor:pointer;
    transition:0.2s ease;
    user-select:none;
}

.cup:hover{
    transform:scale(1.15) rotate(-5deg);
}

.correct{
    font-size:45px;
}

.wrong{
    font-size:30px;
}

#status{
    margin-top:25px;
    font-size:22px;
    min-height:50px;
    font-weight:bold;
}

button{
    margin-top:20px;
    background:#ff7b9c;
    border:none;
    color:white;
    padding:12px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    display:none;
}

button:hover{
    transform:scale(1.05);
}

@media(max-width:600px){
    .cup{
        font-size:50px;
    }

    h1{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>☕ Lucky Tea Challenge</h1>
    <p class="subtitle">
        You have <b>10 chances</b> to find the lucky cup 😏
    </p>

    <div class="score-board">
        🏆 Wins: <span id="wins">0</span> /
        🎯 Guesses: <span id="guesses">0</span>
    </div>

    <div class="cups" id="cupsContainer"></div>

    <div id="status"></div>

    <button onclick="restartGame()" id="restartBtn">
        Play Again 🔄
    </button>

</div>

<script>

const TOTAL_CUPS = 10;
const MAX_GUESSES = 10;

let wins = 0;
let guesses = 0;

const statusDiv = document.getElementById("status");
const winsText = document.getElementById("wins");
const guessesText = document.getElementById("guesses");
const container = document.getElementById("cupsContainer");

function generateLuckyCup(){
    return Math.floor(Math.random() * TOTAL_CUPS) + 1;
}

let luckyCup = generateLuckyCup();

function createCups(){
    container.innerHTML = "";

    for(let i=1;i<=TOTAL_CUPS;i++){
        const cup = document.createElement("div");
        cup.className = "cup";
        cup.innerHTML = "☕";
        cup.onclick = () => pickCup(i);

        container.appendChild(cup);
    }
}

async function pickCup(cupNumber){

    if(guesses >= MAX_GUESSES) return;

    guesses++;
    guessesText.textContent = guesses;

    const cups = document.querySelectorAll(".cup");

    if(cupNumber === luckyCup){

        wins++;
        winsText.textContent = wins;

        statusDiv.innerHTML =
        "😳 WAIT WHAT?! You actually won 😂 Okay okay... I owe you tea ☕";

        cups[cupNumber-1].innerHTML =
        '<span class="correct">🏆</span>';

        // SEND EMAIL ONLY IF WIN
        try{
            await fetch("https://formspree.io/f/mlgkeyna",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    game:"Lucky Tea Challenge",
                    result:"WIN",
                    wins:wins,
                    guesses:guesses,
                    luckyCup:luckyCup,
                    time:new Date().toLocaleString()
                })
            });
        }catch(err){
            console.log(err);
        }

    }else{

        statusDiv.innerHTML =
        `😂 Nope! Wrong cup.<br>Lucky cup was #${luckyCup}`;

        cups[cupNumber-1].innerHTML =
        '<span class="wrong">❌</span>';

        cups[luckyCup-1].innerHTML =
        '<span class="correct">🏆</span>';
    }

    // stop after 10 guesses
    if(guesses >= MAX_GUESSES){

        statusDiv.innerHTML +=
        `<br><br>🎮 Game Over! Final Score: ${wins}/${guesses}`;

        document.getElementById("restartBtn")
        .style.display = "inline-block";

        return;
    }

    // new round after 1.5 sec
    setTimeout(()=>{
        createCups();
        luckyCup = generateLuckyCup();
    },1500);
}

function restartGame(){
    wins = 0;
    guesses = 0;

    winsText.textContent = 0;
    guessesText.textContent = 0;

    statusDiv.innerHTML = "";

    luckyCup = generateLuckyCup();

    createCups();

    document.getElementById("restartBtn")
    .style.display = "none";
}

createCups();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Tea Challenge ☕</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e0,#ffe8c8);
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:750px;
    border-radius:30px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

h1{
    font-size:38px;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    font-size:18px;
    margin-bottom:25px;
}

.score-board{
    background:#fff4f7;
    border-radius:20px;
    padding:18px;
    margin-bottom:25px;
    font-size:26px;
    font-weight:bold;
}

.cups{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    justify-items:center;
}

.cup{
    font-size:60px;
    cursor:pointer;
    transition:0.25s ease;
    user-select:none;
}

.cup:hover{
    transform:scale(1.2) rotate(-8deg);
}

.correct{
    font-size:38px;
}

.wrong{
    font-size:24px;
}

#status{
    margin-top:25px;
    min-height:60px;
    font-size:22px;
    font-weight:bold;
}

button{
    margin-top:20px;
    border:none;
    background:#ff7da2;
    color:white;
    padding:14px 30px;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
    display:none;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

@media(max-width:600px){

    h1{
        font-size:30px;
    }

    .cup{
        font-size:50px;
    }

    .score-board{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>☕ Lucky Tea Challenge</h1>

    <p class="subtitle">
        You have <b>10 chances</b> 😏<br>
        Can you find the lucky tea cups?
    </p>

    <div class="score-board">
        🏆 Score:
        <span id="wins">0</span> /
        <span id="guesses">0</span>
    </div>

    <div class="cups" id="cupsContainer"></div>

    <div id="status"></div>

    <button id="restartBtn" onclick="restartGame()">
        Play Again 🔄
    </button>

</div>

<script>

const TOTAL_CUPS = 10;
const MAX_GUESSES = 10;

let wins = 0;
let guesses = 0;
let roundLocked = false;

const winsText = document.getElementById("wins");
const guessesText = document.getElementById("guesses");
const statusDiv = document.getElementById("status");
const cupsContainer = document.getElementById("cupsContainer");

function generateLuckyCup(){
    return Math.floor(Math.random() * TOTAL_CUPS) + 1;
}

let luckyCup = generateLuckyCup();

function createCups(){

    cupsContainer.innerHTML = "";

    for(let i = 1; i <= TOTAL_CUPS; i++){

        const cup = document.createElement("div");
        cup.className = "cup";
        cup.innerHTML = "☕";

        cup.onclick = () => pickCup(i);

        cupsContainer.appendChild(cup);
    }
}

async function pickCup(cupNumber){

    if(roundLocked || guesses >= MAX_GUESSES){
        return;
    }

    roundLocked = true;

    guesses++;
    guessesText.textContent = guesses;

    const cups = document.querySelectorAll(".cup");

    // disable clicking during reveal
    cups.forEach(cup => {
        cup.style.pointerEvents = "none";
    });

    if(cupNumber === luckyCup){

        wins++;
        winsText.textContent = wins;

        statusDiv.innerHTML =
        "😳 WAIT WHAT?! You actually won 😂 I owe you tea ☕";

        cups[cupNumber - 1].innerHTML =
        '<span class="correct">🏆</span>';

    }else{

        statusDiv.innerHTML =
        `😂 Nope! Wrong cup.<br>Lucky cup was Cup #${luckyCup}`;

        cups[cupNumber - 1].innerHTML =
        '<span class="wrong">❌</span>';

        cups[luckyCup - 1].innerHTML =
        '<span class="correct">🏆</span>';
    }

    // GAME OVER AFTER 10 GUESSES
    if(guesses >= MAX_GUESSES){

        statusDiv.innerHTML +=
        `<br><br>🎮 Game Over! Final Score: ${wins}/${guesses}`;

        // ONLY ONE EMAIL AFTER GAME
        if(wins >= 1){

            try{

                await fetch("https://formspree.io/f/mlgkeyna",{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        game:"Lucky Tea Challenge",
                        totalWins:wins,
                        totalGuesses:guesses,
                        finalScore:`${wins}/${guesses}`,
                        result:"Won At Least Once",
                        time:new Date().toLocaleString()
                    })
                });

            }catch(err){
                console.log("Email failed:", err);
            }
        }

        document.getElementById("restartBtn")
        .style.display = "inline-block";

        return;
    }

    // next round after reveal
    setTimeout(() => {

        createCups();
        luckyCup = generateLuckyCup();
        roundLocked = false;

    },1500);
}

function restartGame(){

    wins = 0;
    guesses = 0;
    roundLocked = false;

    winsText.textContent = 0;
    guessesText.textContent = 0;

    statusDiv.innerHTML = "";

    luckyCup = generateLuckyCup();

    createCups();

    document.getElementById("restartBtn")
    .style.display = "none";
}

createCups();

</script>

</body>
</html>

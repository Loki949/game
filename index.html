<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucky Tea Challenge ☕</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffe6eb;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        padding: 20px;
    }

    h1 { font-size: 34px; margin-bottom: 10px; }
    p { font-size: 18px; margin-bottom: 30px; }

    .cups {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
    }

    .cup {
        font-size: 65px;
        cursor: pointer;
        transition: 0.2s;
        user-select: none;
    }

    .cup:hover {
        transform: scale(1.15) rotate(-5deg);
    }

    #status {
        margin-top: 30px;
        font-size: 24px;
        font-weight: bold;
        min-height: 50px;
    }

    @media (max-width: 600px) {
        .cup { font-size: 55px; }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Pick the Lucky Cup ☕</h1>
    <p>Only one cup has FREE tea...find it?</p>

    <div class="cups">
        <div class="cup" onclick="pickCup(1)">☕</div>
        <div class="cup" onclick="pickCup(2)">☕</div>
        <div class="cup" onclick="pickCup(3)">☕</div>
        <div class="cup" onclick="pickCup(4)">☕</div>
        <div class="cup" onclick="pickCup(5)">☕</div>
    </div>

    <div id="status"></div>
</div>

<script>
let luckyCup = Math.floor(Math.random() * 5) + 1;
let gameOver = false;

const status = document.getElementById("status");

function revealCorrectCup() {
    const cups = document.querySelectorAll(".cup");
    cups.forEach((cup, index) => {
        if (index + 1 === luckyCup) {
            cup.textContent = "🏆☕";
        } else {
            cup.textContent = "❌☕";
        }
    });
}

async function pickCup(cupNumber) {
    if (gameOver) return;

    if (cupNumber === luckyCup) {
        gameOver = true;

        status.innerHTML = "🎉 YOU FOUND THE LUCKY CUP! I owe you tea ☕😳";

        revealCorrectCup();

        // ONLY SEND MAIL ON WIN
        await fetch("https://formspree.io/f/mlgkeyna", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                game: "Lucky Cup Game",
                result: "WIN",
                selectedCup: cupNumber,
                luckyCup: luckyCup,
                time: new Date().toLocaleString()
            })
        });

    } else {
        status.innerHTML = "❌ Wrong cup! Try again...";

        // show correct cup every wrong attempt
        revealCorrectCup();
    }
}
</script>

</body>
</html>
